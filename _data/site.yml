faq:
  - q: Why rebuild this as a Jekyll site?
    a: Because GitHub Pages supports Jekyll directly, which makes prompts, posts, and SEO metadata much easier to manage than one long HTML file.
  - q: How do I add a new product?
    a: Create a new file in the _prompts folder, fill in the front matter, add your PromptBase link, and the site updates automatically.
  - q: How do I publish blog posts every day?
    a: Add a Markdown file to the _posts folder using the date-title format and GitHub Pages will build the article page and index automatically.
